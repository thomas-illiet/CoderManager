services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coder_manager
      POSTGRES_USER: coder_manager
      POSTGRES_PASSWORD: coder_manager
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coder_manager -d coder_manager"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment: &app-environment
      CODER_MANAGER_DATABASE_URL: postgresql+asyncpg://coder_manager:coder_manager@postgres:5432/coder_manager
      CODER_MANAGER_CELERY_BROKER_URL: redis://redis:6379/0
      CODER_MANAGER_CELERY_RESULT_BACKEND: redis://redis:6379/1
      CODER_MANAGER_INSTANCE_RETRY_INTERVAL_SECONDS: ${CODER_MANAGER_INSTANCE_RETRY_INTERVAL_SECONDS:-60}
      CODER_MANAGER_CRYPTO_KEY: ${CODER_MANAGER_CRYPTO_KEY:-}
      CODER_MANAGER_ARGOCD_URL: ${CODER_MANAGER_ARGOCD_URL:-}
      CODER_MANAGER_ARGOCD_TOKEN: ${CODER_MANAGER_ARGOCD_TOKEN:-}
      CODER_MANAGER_ARGOCD_SKIP_SSL_VERIFY: ${CODER_MANAGER_ARGOCD_SKIP_SSL_VERIFY:-false}
      CODER_MANAGER_ARGOCD_PROJECT: ${CODER_MANAGER_ARGOCD_PROJECT:-}
      CODER_MANAGER_ARGOCD_APPLICATION_PREFIX: ${CODER_MANAGER_ARGOCD_APPLICATION_PREFIX:-coder}
      CODER_MANAGER_ARGOCD_REPOSITORY_URL: ${CODER_MANAGER_ARGOCD_REPOSITORY_URL:-}
      CODER_MANAGER_ARGOCD_REPOSITORY_PATH: ${CODER_MANAGER_ARGOCD_REPOSITORY_PATH:-}
      CODER_MANAGER_ARGOCD_TARGET_REVISION: ${CODER_MANAGER_ARGOCD_TARGET_REVISION:-}
      CODER_MANAGER_ARGOCD_DESTINATION_NAME: ${CODER_MANAGER_ARGOCD_DESTINATION_NAME:-}
      CODER_MANAGER_CYBERARK_EMEA_DEVELOPMENT_APP_ID: ${CODER_MANAGER_CYBERARK_EMEA_DEVELOPMENT_APP_ID:-}
      CODER_MANAGER_CYBERARK_EMEA_DEVELOPMENT_CERT_NAME: ${CODER_MANAGER_CYBERARK_EMEA_DEVELOPMENT_CERT_NAME:-}
      CODER_MANAGER_CYBERARK_EMEA_DEVELOPMENT_KEY_NAME: ${CODER_MANAGER_CYBERARK_EMEA_DEVELOPMENT_KEY_NAME:-}
      CODER_MANAGER_CYBERARK_EMEA_DEVELOPMENT_SAFE: ${CODER_MANAGER_CYBERARK_EMEA_DEVELOPMENT_SAFE:-}
      CODER_MANAGER_CYBERARK_EMEA_STAGING_APP_ID: ${CODER_MANAGER_CYBERARK_EMEA_STAGING_APP_ID:-}
      CODER_MANAGER_CYBERARK_EMEA_STAGING_CERT_NAME: ${CODER_MANAGER_CYBERARK_EMEA_STAGING_CERT_NAME:-}
      CODER_MANAGER_CYBERARK_EMEA_STAGING_KEY_NAME: ${CODER_MANAGER_CYBERARK_EMEA_STAGING_KEY_NAME:-}
      CODER_MANAGER_CYBERARK_EMEA_STAGING_SAFE: ${CODER_MANAGER_CYBERARK_EMEA_STAGING_SAFE:-}
      CODER_MANAGER_CYBERARK_EMEA_PRODUCTION_APP_ID: ${CODER_MANAGER_CYBERARK_EMEA_PRODUCTION_APP_ID:-}
      CODER_MANAGER_CYBERARK_EMEA_PRODUCTION_CERT_NAME: ${CODER_MANAGER_CYBERARK_EMEA_PRODUCTION_CERT_NAME:-}
      CODER_MANAGER_CYBERARK_EMEA_PRODUCTION_KEY_NAME: ${CODER_MANAGER_CYBERARK_EMEA_PRODUCTION_KEY_NAME:-}
      CODER_MANAGER_CYBERARK_EMEA_PRODUCTION_SAFE: ${CODER_MANAGER_CYBERARK_EMEA_PRODUCTION_SAFE:-}
      CODER_MANAGER_CYBERARK_APAC_DEVELOPMENT_APP_ID: ${CODER_MANAGER_CYBERARK_APAC_DEVELOPMENT_APP_ID:-}
      CODER_MANAGER_CYBERARK_APAC_DEVELOPMENT_CERT_NAME: ${CODER_MANAGER_CYBERARK_APAC_DEVELOPMENT_CERT_NAME:-}
      CODER_MANAGER_CYBERARK_APAC_DEVELOPMENT_KEY_NAME: ${CODER_MANAGER_CYBERARK_APAC_DEVELOPMENT_KEY_NAME:-}
      CODER_MANAGER_CYBERARK_APAC_DEVELOPMENT_SAFE: ${CODER_MANAGER_CYBERARK_APAC_DEVELOPMENT_SAFE:-}
      CODER_MANAGER_CYBERARK_APAC_STAGING_APP_ID: ${CODER_MANAGER_CYBERARK_APAC_STAGING_APP_ID:-}
      CODER_MANAGER_CYBERARK_APAC_STAGING_CERT_NAME: ${CODER_MANAGER_CYBERARK_APAC_STAGING_CERT_NAME:-}
      CODER_MANAGER_CYBERARK_APAC_STAGING_KEY_NAME: ${CODER_MANAGER_CYBERARK_APAC_STAGING_KEY_NAME:-}
      CODER_MANAGER_CYBERARK_APAC_STAGING_SAFE: ${CODER_MANAGER_CYBERARK_APAC_STAGING_SAFE:-}
      CODER_MANAGER_CYBERARK_APAC_PRODUCTION_APP_ID: ${CODER_MANAGER_CYBERARK_APAC_PRODUCTION_APP_ID:-}
      CODER_MANAGER_CYBERARK_APAC_PRODUCTION_CERT_NAME: ${CODER_MANAGER_CYBERARK_APAC_PRODUCTION_CERT_NAME:-}
      CODER_MANAGER_CYBERARK_APAC_PRODUCTION_KEY_NAME: ${CODER_MANAGER_CYBERARK_APAC_PRODUCTION_KEY_NAME:-}
      CODER_MANAGER_CYBERARK_APAC_PRODUCTION_SAFE: ${CODER_MANAGER_CYBERARK_APAC_PRODUCTION_SAFE:-}
      CODER_MANAGER_CYBERARK_AMER_DEVELOPMENT_APP_ID: ${CODER_MANAGER_CYBERARK_AMER_DEVELOPMENT_APP_ID:-}
      CODER_MANAGER_CYBERARK_AMER_DEVELOPMENT_CERT_NAME: ${CODER_MANAGER_CYBERARK_AMER_DEVELOPMENT_CERT_NAME:-}
      CODER_MANAGER_CYBERARK_AMER_DEVELOPMENT_KEY_NAME: ${CODER_MANAGER_CYBERARK_AMER_DEVELOPMENT_KEY_NAME:-}
      CODER_MANAGER_CYBERARK_AMER_DEVELOPMENT_SAFE: ${CODER_MANAGER_CYBERARK_AMER_DEVELOPMENT_SAFE:-}
      CODER_MANAGER_CYBERARK_AMER_STAGING_APP_ID: ${CODER_MANAGER_CYBERARK_AMER_STAGING_APP_ID:-}
      CODER_MANAGER_CYBERARK_AMER_STAGING_CERT_NAME: ${CODER_MANAGER_CYBERARK_AMER_STAGING_CERT_NAME:-}
      CODER_MANAGER_CYBERARK_AMER_STAGING_KEY_NAME: ${CODER_MANAGER_CYBERARK_AMER_STAGING_KEY_NAME:-}
      CODER_MANAGER_CYBERARK_AMER_STAGING_SAFE: ${CODER_MANAGER_CYBERARK_AMER_STAGING_SAFE:-}
      CODER_MANAGER_CYBERARK_AMER_PRODUCTION_APP_ID: ${CODER_MANAGER_CYBERARK_AMER_PRODUCTION_APP_ID:-}
      CODER_MANAGER_CYBERARK_AMER_PRODUCTION_CERT_NAME: ${CODER_MANAGER_CYBERARK_AMER_PRODUCTION_CERT_NAME:-}
      CODER_MANAGER_CYBERARK_AMER_PRODUCTION_KEY_NAME: ${CODER_MANAGER_CYBERARK_AMER_PRODUCTION_KEY_NAME:-}
      CODER_MANAGER_CYBERARK_AMER_PRODUCTION_SAFE: ${CODER_MANAGER_CYBERARK_AMER_PRODUCTION_SAFE:-}
      CODER_MANAGER_DEFAULT_ADMINS: ${CODER_MANAGER_DEFAULT_ADMINS:-}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    environment: *app-environment
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["celery", "-A", "coder_manager.celery_app:celery_app", "worker", "--loglevel=INFO"]
    environment: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  beat:
    build: .
    command:
      - celery
      - -A
      - coder_manager.celery_app:celery_app
      - beat
      - --loglevel=INFO
      - --schedule=/tmp/celerybeat-schedule
    environment: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres-data:
